<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#03060d" />
    <meta name="description" content="Daymark — a private 28-day personal improvement tracker." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260717-26" />
    <title>Daymark — 28 Day Improvement Tracker</title>
  </head>
  <body class="dark">
    <div class="ambient-bg" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Application sidebar">
        <a class="brand" href="#today" data-view-link="today" aria-label="Daymark today page">
          <span class="brand-mark"><i></i><i></i><i></i></span>
          <span><strong>daymark</strong><small>BUILD YOUR STANDARD</small></span>
        </a>
        <nav class="main-nav" aria-label="Main navigation">
          <button class="nav-item active" data-view="today"><span data-icon="today"></span><span>Today</span></button>
          <button class="nav-item" data-view="dashboard"><span data-icon="dashboard"></span><span>Dashboard</span></button>
          <button class="nav-item" data-view="cycle"><span data-icon="shield"></span><span>Semen retention</span></button>
          <button class="nav-item" data-view="history"><span data-icon="scale"></span><span>Weight management</span></button>
          <button class="nav-item" data-view="settings"><span data-icon="settings"></span><span>Settings</span></button>
        </nav>
        <section class="sidebar-cycle" id="sidebarCycle" aria-label="Current cycle"></section>
        <p class="storage-note"><span class="storage-dot"></span>Saved privately on this device</p>
      </aside>

      <header class="mobile-bar">
        <a class="brand compact" href="#today" data-view-link="today" aria-label="Daymark today page">
          <span class="brand-mark"><i></i><i></i><i></i></span><strong>daymark</strong>
        </a>
        <div class="mobile-actions">
          <button class="icon-button" data-action="quick-add" aria-label="Quick add"><span data-icon="plus"></span></button>
          <button class="icon-button" data-action="open-settings" aria-label="Open settings"><span data-icon="settings"></span></button>
        </div>
      </header>

      <main id="mainContent" tabindex="-1">
        <section class="view" id="dashboardView" aria-label="Dashboard"><div id="dashboardContent"></div></section>
        <section class="view active" id="todayView" aria-label="Daily checklist"><div id="todayContent"></div></section>
        <section class="view" id="cycleView" aria-label="Semen retention"><div id="cycleContent"></div></section>
        <section class="view" id="historyView" aria-label="Weight management"><div id="historyContent"></div></section>
        <section class="view" id="settingsView" aria-label="Settings"><div id="settingsContent"></div></section>
      </main>

      <nav class="mobile-nav" aria-label="Mobile navigation">
        <button class="nav-item active" data-view="today"><span data-icon="today"></span><span>Today</span></button>
        <button class="nav-item" data-view="dashboard"><span data-icon="dashboard"></span><span>Week</span></button>
        <button class="nav-item" data-view="cycle"><span data-icon="shield"></span><span>Retention</span></button>
        <button class="nav-item" data-view="history"><span data-icon="scale"></span><span>Weight</span></button>
        <button class="nav-item" data-view="settings"><span data-icon="settings"></span><span>Settings</span></button>
      </nav>
    </div>

    <dialog id="quickAddDialog" class="sheet-dialog">
      <form id="quickAddForm">
        <header class="dialog-header">
          <div><p class="kicker">QUICK ADD</p><h2>Capture progress</h2></div>
          <button type="button" class="close-button" data-close-dialog="quickAddDialog" aria-label="Close quick add">×</button>
        </header>
        <label class="field"><span>What would you like to add?</span>
          <select id="quickAddType">
            <option value="habit">Custom habit</option>
            <option value="task">One-time task</option>
            <option value="weight">Record weight</option>
            <option value="learning">Learning minutes</option>
            <option value="activity">Swimming / walking</option>
            <option value="note">Daily note</option>
          </select>
        </label>
        <div id="quickAddFields"></div>
        <p class="form-error" id="quickAddError" role="alert"></p>
        <button class="primary-button" type="submit"><span data-icon="plus"></span> Save entry</button>
      </form>
    </dialog>

    <dialog id="habitDialog" class="sheet-dialog wide-dialog">
      <div id="habitDialogContent"></div>
    </dialog>

    <dialog id="weightDialog" class="sheet-dialog">
      <form id="weightForm">
        <header class="dialog-header">
          <div><p class="kicker">WEIGHT CHECK-IN</p><h2 id="weightDialogTitle">Record today’s weight</h2></div>
          <button type="button" class="close-button" data-close-dialog="weightDialog" aria-label="Close weight dialog">×</button>
        </header>
        <input type="hidden" id="weightDate" />
        <label class="field"><span>Weight (kg)</span><input id="weightValue" type="number" min="20" max="400" step="0.1" inputmode="decimal" required placeholder="e.g. 82.4" /></label>
        <label class="field"><span>Optional note</span><textarea id="weightNote" maxlength="180" rows="3" placeholder="How are you feeling today?"></textarea></label>
        <p class="form-error" id="weightError" role="alert"></p>
        <button class="primary-button" type="submit">Save measurement</button>
        <p class="privacy-copy">Weight is a neutral measurement and never affects your habit score.</p>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <input type="file" id="importInput" accept="application/json" hidden />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js?v=20260717-10", { scope: "./", updateViaCache: "none" })
            .catch(error => console.warn("Daymark offline setup", error));
        });
      }
    </script>
    <script type="module" src="app.js?v=20260717-26"></script>
  </body>
</html>
